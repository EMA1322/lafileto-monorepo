<!-- Header (fragmento SPA, sin <!DOCTYPE>) -->
<header class="header">
  <div class="header__overlay" id="header-overlay" aria-hidden="true" hidden></div>

  <nav class="header__nav container" role="navigation" aria-label="Navegacion principal">
    <a href="#home" class="header__brand" aria-label="Ir al inicio">
      <span class="header__brand-mark" aria-hidden="true">LF</span>
      <span class="header__brand-copy">
        <span class="header__brand-name">La Fileto</span>
        <span class="header__brand-note">Menu digital</span>
      </span>
    </a>

    <ul class="header__links" aria-label="Secciones principales">
      <li><a href="#home">Inicio</a></li>
      <li><a href="#products">Productos</a></li>
      <li><a href="#contact">Contacto</a></li>
    </ul>

    <div class="header__meta">
      <a class="header__contact-link is-hidden" href="#" data-header-phone-link aria-label="Llamar a La Fileto">
        <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.2 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.1.9.3 1.7.6 2.5a2 2 0 0 1-.5 2.1L8 9.5a16 16 0 0 0 6.5 6.5l1.2-1.2a2 2 0 0 1 2.1-.5c.8.3 1.6.5 2.5.6A2 2 0 0 1 22 16.9z" />
        </svg>
        <span data-header-phone-text></span>
      </a>

      <span id="business-status" class="header__status" aria-live="polite" aria-atomic="true">
        <span class="header__status-dot" aria-hidden="true"></span>
        <span data-header-status-text>Cargando...</span>
      </span>
    </div>

    <div class="header__actions">
      <a href="#cart" class="header__cart" aria-label="Ir al carrito">
        <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M6.4 6H21l-2 8.5a2 2 0 0 1-2 1.5H8.2a2 2 0 0 1-2-1.6L4.8 3.8H2V2h4.4L6.8 5.8 6.4 6zm2 8h8.7l1.4-6H7.1l1.3 6zM9 22a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm8 0a2 2 0 1 1 0-4 2 2 0 0 1 0 4z" />
        </svg>
        <span id="cart-count" class="header__cart-count" aria-label="Productos en el carrito" aria-live="polite" aria-atomic="true">0</span>
      </a>

      <button class="header__toggle" id="menu-toggle" type="button" aria-label="Abrir menu de navegacion" aria-controls="nav-menu" aria-expanded="false">
        <span class="header__bar"></span>
        <span class="header__bar"></span>
        <span class="header__bar"></span>
        <span class="sr-only">Menu</span>
      </button>
    </div>
  </nav>

  <aside class="header__menu" id="nav-menu" aria-label="Menu de navegacion" aria-hidden="true" tabindex="-1">
    <div class="header__menu-head">
      <a href="#home" class="header__drawer-brand" aria-label="Ir al inicio">La Fileto</a>
      <button class="header__close" type="button" data-header-close aria-label="Cerrar menu">
        <svg class="header__icon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="m6.4 5 12.6 12.6-1.4 1.4L5 6.4 6.4 5zm12.6 1.4L6.4 19 5 17.6 17.6 5 19 6.4z" />
        </svg>
      </button>
    </div>

    <ul class="header__menu-list">
      <li><a href="#home">Inicio</a></li>
      <li><a href="#products">Productos</a></li>
      <li><a href="#contact">Contacto</a></li>
    </ul>

    <div class="header__drawer-details">
      <div class="header__drawer-contact is-hidden" data-header-drawer-contact>
        <span class="header__drawer-label">Contacto</span>
        <a class="header__drawer-link is-hidden" href="#" data-header-drawer-phone></a>
        <a class="header__drawer-link is-hidden" href="#" data-header-whatsapp-link>WhatsApp</a>
      </div>

      <div class="header__socials is-hidden" data-header-socials aria-label="Redes sociales"></div>
    </div>
  </aside>
</header>
