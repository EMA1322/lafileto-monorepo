<!doctype html>
<html lang="es" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel Header</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <script src="/_sdk/element_sdk.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        inter: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        primary: '#111827',
                        secondary: '#6B7280',
                        pillBg: '#F3F4F6',
                        borderSubtle: '#E5E7EB',
                        accent: '#F59E0B',
                    }
                }
            }
        }
    </script>
    <style>
        * {
            font-family: 'Inter', system-ui, sans-serif;
        }

        /* Animación de entrada del header */
        @keyframes slideDownHeader {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        header {
            animation: slideDownHeader 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Tab items con animación suave */
        .tab-item {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #6B7280;
        }

        .tab-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: #F9FAFB;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .tab-item:hover:not(.active)::before {
            left: 0;
        }

        .tab-item:hover:not(.active) {
            color: #111827;
        }

        .tab-item.active {
            background-color: #F3F4F6;
            color: #111827;
        }

        /* Línea inferior animada para tabs activos */
        .tab-item.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #F59E0B, #FBBF24);
            border-radius: 3px 3px 0 0;
            animation: expandWidth 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 2px 8px rgba(245, 158, 11, 0.3);
        }

        @keyframes expandWidth {
            from {
                width: 0;
                left: 50%;
            }

            to {
                width: 100%;
                left: 0;
            }
        }

        /* Logout button con efecto ripple */
        .logout-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logout-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background-color: rgba(245, 158, 11, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .logout-btn:hover::before {
            width: 100px;
            height: 100px;
        }

        .logout-btn:hover {
            background-color: #FEF3C7;
            color: #D97706;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(245, 158, 11, 0.25);
        }

        .logout-btn:hover svg {
            stroke: #D97706;
            animation: exitPulse 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes exitPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Mobile menu button con rotación */
        .mobile-menu-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .mobile-menu-btn:hover {
            background-color: #F3F4F6;
            transform: scale(1.05);
        }

        .mobile-menu-btn svg {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-menu-btn.active svg {
            transform: rotate(90deg);
        }

        /* Mobile menu overlay */
        .mobile-menu {
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: -4px 0 20px rgba(0, 0, 0, 0.1);
        }

        .mobile-menu.open {
            transform: translateX(0);
        }

        .menu-overlay {
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(4px);
        }

        .menu-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Mobile nav items animación */
        .mobile-nav-item {
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }

        .mobile-nav-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background-color: rgba(245, 158, 11, 0.08);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: -1;
        }

        .mobile-nav-item:hover:not(.active)::before {
            left: 0;
        }

        .mobile-nav-item:hover:not(.active) {
            transform: translateX(4px);
            color: #111827;
        }

        .mobile-nav-item.active {
            background-color: #F3F4F6;
            animation: slideInActive 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .mobile-nav-item svg {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .mobile-nav-item:hover svg {
            transform: scale(1.1);
        }

        @keyframes slideInActive {
            from {
                transform: translateX(-20px);
                opacity: 0;
            }

            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Avatar con pulso suave */
        .avatar-pulse {
            animation: avatarPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes avatarPulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(245, 158, 11, 0.4);
            }

            50% {
                box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
            }
        }

        /* Pills con efecto hover */
        .pill-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .pill-item:hover {
            background-color: #E5E7EB;
            transform: scale(1.02);
        }

        /* Stagger animation para elementos en el menú móvil */
        .mobile-menu.open .mobile-nav-item {
            animation: slideInMenu 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
        }

        .mobile-menu.open .mobile-nav-item:nth-child(1) {
            animation-delay: 0.05s;
        }

        .mobile-menu.open .mobile-nav-item:nth-child(2) {
            animation-delay: 0.1s;
        }

        .mobile-menu.open .mobile-nav-item:nth-child(3) {
            animation-delay: 0.15s;
        }

        .mobile-menu.open .mobile-nav-item:nth-child(4) {
            animation-delay: 0.2s;
        }

        .mobile-menu.open .mobile-nav-item:nth-child(5) {
            animation-delay: 0.25s;
        }

        @keyframes slideInMenu {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

    <script>
        // Default configuration
        const defaultConfig = {
            admin_title: 'Panel de administración',
            user_name: 'Miguel',
            user_role: 'role-admin',
            background_color: '#FFFFFF',
            text_color: '#111827',
            secondary_text_color: '#6B7280',
            pill_bg_color: '#F3F4F6',
            accent_color: '#F59E0B'
        };

        // Tab switching functionality
        const tabs = document.querySelectorAll('.tab-item');
        const mobileNavItems = document.querySelectorAll('.mobile-nav-item');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // Sync with mobile nav
                const tabName = tab.dataset.tab;
                mobileNavItems.forEach(item => {
                    item.classList.remove('active');
                    item.classList.remove('bg-pillBg', 'font-semibold', 'text-primary');
                    item.classList.add('font-medium', 'text-secondary');
                    const indicator = item.querySelector('.bg-accent');
                    if (indicator) indicator.remove();

                    if (item.dataset.tab === tabName) {
                        item.classList.add('active', 'bg-pillBg', 'font-semibold', 'text-primary');
                        item.classList.remove('font-medium', 'text-secondary');
                        const newIndicator = document.createElement('div');
                        newIndicator.className = 'ml-auto w-1 h-5 bg-accent rounded-full';
                        item.appendChild(newIndicator);
                    }
                });
            });
        });

        mobileNavItems.forEach(item => {
            item.addEventListener('click', () => {
                mobileNavItems.forEach(i => {
                    i.classList.remove('active', 'bg-pillBg', 'font-semibold', 'text-primary');
                    i.classList.add('font-medium', 'text-secondary');
                    const indicator = i.querySelector('.bg-accent');
                    if (indicator) indicator.remove();
                });

                item.classList.add('active', 'bg-pillBg', 'font-semibold', 'text-primary');
                item.classList.remove('font-medium', 'text-secondary');
                const newIndicator = document.createElement('div');
                newIndicator.className = 'ml-auto w-1 h-5 bg-accent rounded-full';
                item.appendChild(newIndicator);

                // Sync with desktop tabs
                const tabName = item.dataset.tab;
                tabs.forEach(tab => {
                    tab.classList.remove('active');
                    if (tab.dataset.tab === tabName) {
                        tab.classList.add('active');
                    }
                });

                // Close mobile menu
                closeMobileMenu();
            });
        });

        // Mobile menu functionality
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeMenuBtn = document.getElementById('close-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        const menuOverlay = document.getElementById('menu-overlay');

        function openMobileMenu() {
            mobileMenu.classList.add('open');
            menuOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            mobileMenu.classList.remove('open');
            menuOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        mobileMenuBtn.addEventListener('click', () => {
            openMobileMenu();
            mobileMenuBtn.classList.add('active');
        });

        closeMenuBtn.addEventListener('click', () => {
            closeMobileMenu();
            mobileMenuBtn.classList.remove('active');
        });

        menuOverlay.addEventListener('click', () => {
            closeMobileMenu();
            mobileMenuBtn.classList.remove('active');
        });

        if (window.elementSdk) {
            window.elementSdk.init({
                defaultConfig,
                onConfigChange: async (config) => {
                    // Update admin title
                    const titleDesktop = document.querySelector('#admin-title .hidden.sm\\:inline');
                    const titleMobile = document.querySelector('#admin-title .sm\\:hidden');
                    if (titleDesktop) titleDesktop.textContent = config.admin_title || defaultConfig.admin_title;
                    if (titleMobile) titleMobile.textContent = 'Admin';

                    // Update user name in all locations
                    const userNameEl = document.getElementById('user-name');
                    const userNameMobile = document.getElementById('user-name-mobile');
                    const userNameMenu = document.getElementById('user-name-menu');
                    const userName = config.user_name || defaultConfig.user_name;
                    if (userNameEl) userNameEl.textContent = userName;
                    if (userNameMobile) userNameMobile.textContent = userName;
                    if (userNameMenu) userNameMenu.textContent = userName;

                    // Update avatar initials
                    const avatars = document.querySelectorAll('.rounded-full.bg-accent\\/20 span');
                    avatars.forEach(avatar => {
                        avatar.textContent = userName.charAt(0).toUpperCase();
                    });

                    // Update user role in all locations
                    const userRoleEl = document.getElementById('user-role');
                    const userRoleMenu = document.getElementById('user-role-menu');
                    const userRole = config.user_role || defaultConfig.user_role;
                    if (userRoleEl) userRoleEl.textContent = userRole;
                    if (userRoleMenu) userRoleMenu.textContent = userRole;

                    // Apply colors
                    document.body.style.backgroundColor = config.background_color || defaultConfig.background_color;
                },
                mapToCapabilities: (config) => ({
                    recolorables: [
                        {
                            get: () => config.background_color || defaultConfig.background_color,
                            set: (value) => window.elementSdk.setConfig({ background_color: value })
                        },
                        {
                            get: () => config.pill_bg_color || defaultConfig.pill_bg_color,
                            set: (value) => window.elementSdk.setConfig({ pill_bg_color: value })
                        },
                        {
                            get: () => config.text_color || defaultConfig.text_color,
                            set: (value) => window.elementSdk.setConfig({ text_color: value })
                        },
                        {
                            get: () => config.accent_color || defaultConfig.accent_color,
                            set: (value) => window.elementSdk.setConfig({ accent_color: value })
                        },
                        {
                            get: () => config.secondary_text_color || defaultConfig.secondary_text_color,
                            set: (value) => window.elementSdk.setConfig({ secondary_text_color: value })
                        }
                    ],
                    borderables: [],
                    fontEditable: {
                        get: () => config.font_family || 'Inter',
                        set: (value) => window.elementSdk.setConfig({ font_family: value })
                    },
                    fontSizeable: {
                        get: () => config.font_size || 14,
                        set: (value) => window.elementSdk.setConfig({ font_size: value })
                    }
                }),
                mapToEditPanelValues: (config) => new Map([
                    ['admin_title', config.admin_title || defaultConfig.admin_title],
                    ['user_name', config.user_name || defaultConfig.user_name],
                    ['user_role', config.user_role || defaultConfig.user_role]
                ])
            });
        }
    </script>
